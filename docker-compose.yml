services:
  db:
    image: postgres:16-alpine
    container_name: pariwana_scheduler_5000_db
    environment:
      POSTGRES_DB: pariwana_buk
      POSTGRES_USER: pariwana
      POSTGRES_PASSWORD: pariwana_dev_password
    ports:
      - "5434:5432"
    volumes:
      - pariwana_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pariwana -d pariwana_buk"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
    container_name: pariwana_scheduler_5000_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: docker-dev-secret-change-me
      DEBUG: "true"
      ENVIRONMENT: development
      ALLOWED_HOSTS: 127.0.0.1,localhost,0.0.0.0
      DATABASE_URL: ""
      DB_NAME: pariwana_buk
      DB_USER: pariwana
      DB_PASSWORD: pariwana_dev_password
      DB_HOST: db
      DB_PORT: "5432"
      TIME_ZONE: America/Lima
      BUK_EXPORT_DEFAULT_FORMAT: xlsx
      BUK_DEFAULT_SHEET_NAME: Reporte carga BUK
      BOOTSTRAP_DEMO_DATA: "1"
      DEMO_PASSWORD: Pariwana2026!
      DEMO_SCHEDULE_DAYS: "30"
    ports:
      - "5000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  pariwana_postgres_data:
