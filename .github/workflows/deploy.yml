# =============================================================================
# Pariwana BUK Scheduler - CI/CD Pipeline
# =============================================================================
# Jobs: test → build → deploy
# build: construye imagen Docker y la sube a ghcr.io
# deploy: copia compose + .env, hace pull en el servidor y reinicia
#
# Se ejecuta al hacer push a main o manualmente (workflow_dispatch).
# Despliega en /home/ubuntu/schedules con Nginx Proxy Manager (npm_network).
#
# Secretos requeridos en GitHub:
#   SSH_PRIVATE_KEY, SSH_HOST, SSH_USER, SSH_PORT, DEPLOY_ENV_FILE
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  COMPOSE_FILE: docker-compose.prod.yml
  DEPLOY_COMPOSE: docker-compose.deploy.yml
  PROJECT_DIR: /home/ubuntu/schedules

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pariwana_buk
          POSTGRES_USER: pariwana
          POSTGRES_PASSWORD: pariwana_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pariwana -d pariwana_buk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        run: |
          python manage.py migrate --noinput
          python manage.py test --noinput --keepdb -v 2
        working-directory: backend
        env:
          SECRET_KEY: test-key
          DATABASE_URL: postgresql://pariwana:pariwana_test@localhost:5432/pariwana_buk

  build:
    name: Build and push image
    needs: test
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$LOWERCASE" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy and health check
    needs: build
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$LOWERCASE" >> $GITHUB_ENV

      - name: Generate deploy compose file with resolved image
        run: |
          printf 'services:\n  web:\n    image: %s/%s:latest\n' \
            "${{ env.REGISTRY }}" "${{ env.IMAGE_NAME }}" \
            > /tmp/${{ env.DEPLOY_COMPOSE }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env from secret
        run: echo "$DEPLOY_ENV_FILE" > /tmp/.env.prod
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}

      - name: Copy files to server
        run: |
          scp -P ${{ secrets.SSH_PORT || 22 }} \
            ${{ env.COMPOSE_FILE }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.PROJECT_DIR }}/
          scp -P ${{ secrets.SSH_PORT || 22 }} \
            /tmp/${{ env.DEPLOY_COMPOSE }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.PROJECT_DIR }}/${{ env.DEPLOY_COMPOSE }}
          scp -P ${{ secrets.SSH_PORT || 22 }} \
            /tmp/.env.prod \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.PROJECT_DIR }}/.env

      - name: Deploy
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ env.PROJECT_DIR }} && \
             docker compose -f ${{ env.COMPOSE_FILE }} -f ${{ env.DEPLOY_COMPOSE }} pull && \
             docker compose -f ${{ env.COMPOSE_FILE }} -f ${{ env.DEPLOY_COMPOSE }} up -d"

      - name: Health check
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ env.PROJECT_DIR }} && \
             echo 'Waiting for health check...' && \
             for i in \$(seq 1 12); do \
               STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health/ || echo '000'); \
               if [ \"\$STATUS\" = \"200\" ]; then \
                 echo 'OK - HTTP \$STATUS'; \
                 exit 0; \
               fi; \
               echo 'Attempt \$i: HTTP \$STATUS, retrying in 5s...'; \
               sleep 5; \
             done; \
             echo 'ERROR: Health check failed after 12 attempts'; \
             docker compose -f ${{ env.COMPOSE_FILE }} -f ${{ env.DEPLOY_COMPOSE }} logs --tail=50 web; \
             exit 1"

      - name: Cleanup
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker image prune -f && docker container prune -f"
